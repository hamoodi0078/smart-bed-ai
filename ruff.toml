target-version = "py311"
line-length = 100

exclude = [
  ".git",
  ".venv",
  ".venv311",
  "__pycache__",
  "runtime_data",
  "output_audio",
]

[lint]
select = [
  "E",   # pycodestyle errors
  "F",   # pyflakes
  "W",   # pycodestyle warnings
  "I",   # import sorting
  "B",   # flake8-bugbear
  "UP",  # pyupgrade
]
ignore = [
  "E203",
  "E266",
]
