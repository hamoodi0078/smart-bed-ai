target-version = "py311"
line-length = 100

exclude = [
  ".git",
  ".venv",
  ".venv311",
  "__pycache__",
  "runtime_data",
  "output_audio",
  "alembic/versions",
  "mobile_app",
  ".tmp",
]

# NOTE: the original strict rule set (E, F, W, I, B, UP, S, SIM, RET, PTH) was
# never actually enforced — the old ruff.toml was malformed and every ruff
# version until 0.15.20 silently fell back to built-in defaults. Enforcing it
# now would surface ~3,500 findings across the legacy monolith. Post-launch,
# ratchet rules up one group at a time (I -> W -> B -> S -> ...).
[lint]
select = [
  "E4",   # pycodestyle: imports
  "E7",   # pycodestyle: statements
  "E9",   # pycodestyle: runtime errors
  "F",    # pyflakes
]
ignore = [
  "E203",
  "E266",
  "E402",  # imports after code — intentional: load_dotenv()/setup_logging() must run first
  "F401",  # unused imports — deferred: legacy modules rely on side-effect imports; clean up post-launch
  "F841",  # unused locals in legacy handlers — clean up post-launch
  "S101",  # assert used (OK in tests)
  "S105",  # hardcoded password (false positives on var names)
  "S106",  # hardcoded password (false positives on var names)
]

# Prevent the monolith from growing further; new routes should go in api/ routers.
# web_server.py is already at the limit — any new code must be in a separate module.
[lint.pycodestyle]
max-doc-length = 120

[lint.per-file-ignores]
"tests/*" = ["S101", "S106"]

[lint.isort]
known-first-party = [
  "ai",
  "api",
  "automations",
  "commands",
  "constants",
  "core",
  "database",
  "health",
  "notifications",
  "scenes",
  "subscriptions",
  "Storage",
]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
