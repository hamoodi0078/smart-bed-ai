name: ci

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Ruff lint
        run: |
          ruff check .

      - name: Pytest (non-blocking for now)
        id: pytest
        continue-on-error: true
        run: |
          pytest -q

      - name: TODO enforce green tests
        if: always()
        run: |
          if [ "${{ steps.pytest.outcome }}" != "success" ]; then
            echo "::warning::Pytest reported failures. TODO: remove continue-on-error and enforce green tests before merge."
          fi
