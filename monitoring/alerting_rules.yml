groups:
  - name: api_alerts
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status_code=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High API error rate detected"
          description: "API error rate is {{ $value | humanizePercentage }} over the last 5 minutes"

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API latency detected"
          description: "P95 latency is {{ $value }}s (threshold: 2s)"

      - alert: HighRequestRate
        expr: rate(http_requests_total[1m]) > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Unusually high request rate"
          description: "Request rate is {{ $value }} req/s"

  - name: infrastructure_alerts
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up{job="smart-bed-api"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Smart Bed API is down"
          description: "The Smart Bed API has been down for more than 2 minutes"

      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes > 1e9
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is {{ $value | humanize1024 }}"

      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total[5m]) > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is {{ $value | humanizePercentage }}"

  - name: business_metrics_alerts
    interval: 60s
    rules:
      - alert: LowVoiceInteractionRate
        expr: rate(voice_interactions_total[1h]) < 0.01
        for: 2h
        labels:
          severity: info
        annotations:
          summary: "Low voice interaction rate"
          description: "Voice interaction rate has been low for 2 hours"

      - alert: HighAuthFailureRate
        expr: rate(auth_failures_total[5m]) > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High authentication failure rate"
          description: "Auth failure rate is {{ $value }} failures/s"
